# RK Inversiones — nginx static (Astro dist)
map $sent_http_content_type $expires_static {
    default                    off;
    text/css                   max;
    application/javascript     max;
    image/svg+xml              max;
    image/png                  max;
    image/jpeg                 max;
    font/woff2                 max;
}

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # DNS dinámico Docker Swarm (proxy a servicios del stack)
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /_astro/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /brand/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location /admin/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ $uri/index.html /admin/index.html;
    }

    # Proxy buró (mismo stack Swarm, nombre de servicio: bureau)
    location /api/bureau/ {
        rewrite ^/api/bureau/?(.*)$ /$1 break;
        proxy_pass http://bureau:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_read_timeout 60s;
    }

    # Notificaciones por correo (mismo stack Swarm, nombre de servicio: notify)
    location /api/notify/ {
        rewrite ^/api/notify/?(.*)$ /$1 break;
        proxy_pass http://notify:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    # Proxy PostgREST Insforge (red RenaceNet)
    location /api/insforge/ {
        rewrite ^/api/insforge/?(.*)$ /$1 break;
        proxy_pass http://insforge_postgrest:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 15s;
        proxy_read_timeout 60s;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ $uri/index.html /index.html;
    }
}
