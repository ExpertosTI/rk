# RK Inversiones — archivos estáticos (Astro dist)
# Entrada pública: Traefik (SSL, dominio, /api/* → microservicios vía labels)
# Este nginx solo sirve HTML/JS/CSS dentro del contenedor rk_web.

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /_astro/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /brand/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location /admin/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ $uri/index.html /admin/index.html;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ $uri/index.html /index.html;
    }
}
