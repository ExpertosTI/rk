<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D3D18"/>
      <stop offset="35%" stop-color="#1A6427"/>
      <stop offset="70%" stop-color="#2E9A3D"/>
      <stop offset="100%" stop-color="#39B54A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#4CCC5E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4CCC5E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#6FD97E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6FD97E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#FFFFFF" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#heroGrad)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <!-- Geometric accents (like flyer) -->
  <polygon points="0,0 120,0 0,200" fill="#39B54A" opacity="0.15"/>
  <polygon points="1920,1080 1800,1080 1920,880" fill="#39B54A" opacity="0.15"/>
  <polygon points="1920,0 1920,150 1750,0" fill="#4CCC5E" opacity="0.1"/>
  <polygon points="0,1080 0,920 150,1080" fill="#4CCC5E" opacity="0.1"/>
</svg>
