# RK Inversiones — Docker Swarm + Traefik (Renace stack)
# Stack: rk  ·  Domain: rk.renace.tech

services:
  web:
    image: rk-web:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_INSFORGE_URL: ${PUBLIC_INSFORGE_URL:-/api/insforge}
        PUBLIC_INSFORGE_MODE: ${PUBLIC_INSFORGE_MODE:-postgrest}
        PUBLIC_INSFORGE_ANON_KEY: ${PUBLIC_INSFORGE_ANON_KEY:-${INSFORGE_ANON_KEY:-}}
        PUBLIC_INSFORGE_SERVICE_KEY: ${PUBLIC_INSFORGE_SERVICE_KEY:-${INSFORGE_SERVICE_KEY:-}}
        PUBLIC_ADMIN_PIN: ${PUBLIC_ADMIN_PIN:-RK2026}
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.docker.network=RenaceNet
        - traefik.constraint-label=traefik-public

        - traefik.http.routers.rk-http.rule=Host(`rk.renace.tech`)
        - traefik.http.routers.rk-http.entrypoints=web
        - traefik.http.routers.rk-http.middlewares=rk-redirect-https

        - traefik.http.routers.rk.rule=Host(`rk.renace.tech`)
        - traefik.http.routers.rk.entrypoints=websecure
        - traefik.http.routers.rk.tls=true
        - traefik.http.routers.rk.tls.certresolver=letsencryptresolver
        - traefik.http.routers.rk.service=rk-svc
        - traefik.http.routers.rk.middlewares=rk-security

        - traefik.http.services.rk-svc.loadbalancer.server.port=80
        - traefik.http.services.rk-svc.loadbalancer.healthcheck.path=/healthz
        - traefik.http.services.rk-svc.loadbalancer.healthcheck.interval=30s

        - traefik.http.middlewares.rk-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.rk-redirect-https.redirectscheme.permanent=true

        - traefik.http.middlewares.rk-security.headers.stsSeconds=31536000
        - traefik.http.middlewares.rk-security.headers.contentTypeNosniff=true
        - traefik.http.middlewares.rk-security.headers.browserXssFilter=true

  bureau:
    image: rk-bureau:latest
    build:
      context: ./services/bureau
      dockerfile: Dockerfile
    environment:
      PORT: "8787"
      TRANSUNION_MODE: ${TRANSUNION_MODE:-mock}
      TRANSUNION_CLIENT_ID: ${TRANSUNION_CLIENT_ID:-}
      TRANSUNION_CLIENT_SECRET: ${TRANSUNION_CLIENT_SECRET:-}
      TRANSUNION_TOKEN_URL: ${TRANSUNION_TOKEN_URL:-}
      TRANSUNION_API_URL: ${TRANSUNION_API_URL:-}
      TRANSUNION_SUBSCRIBER_CODE: ${TRANSUNION_SUBSCRIBER_CODE:-}
      BUREAU_ADMIN_PIN: ${PUBLIC_ADMIN_PIN:-RK2026}
      INSFORGE_URL: http://insforge_postgrest:3000
      INSFORGE_SERVICE_KEY: ${INSFORGE_SERVICE_KEY:-}
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  notify:
    image: rk-notify:latest
    build:
      context: ./services/notify
      dockerfile: Dockerfile
    environment:
      PORT: "8788"
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-info@renace.tech}
      SMTP_PASS: ${SMTP_PASS:-}
      NOTIFY_FROM: ${NOTIFY_FROM:-RK Inversiones <info@renace.tech>}
      NOTIFY_TO: ${NOTIFY_TO:-jcamacho-gomez@hotmail.com}
      NOTIFY_SECRET: ${NOTIFY_SECRET:-}
      ADMIN_URL: https://rk.renace.tech/admin
      INSFORGE_URL: http://insforge_postgrest:3000
      INSFORGE_SERVICE_KEY: ${INSFORGE_SERVICE_KEY:-}
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

networks:
  RenaceNet:
    external: true
